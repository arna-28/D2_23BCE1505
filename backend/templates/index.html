<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dementia Risk Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center">

<div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-2xl">
    <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">
        Dementia Risk Predictor
    </h1>
    <p class="text-center text-gray-500 mb-6">
        Upload a patient’s voice sample
    </p>

    <form action="/predict" method="POST" enctype="multipart/form-data" class="space-y-4">
        <input
            type="file"
            name="audio"
            accept=".wav,.mp3"
            required
            class="w-full border border-gray-300 rounded-lg p-2"
        />

        <button
            type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition">
            Analyze Audio
        </button>
    </form>

    {% if prediction %}
    <div class="mt-6 p-4 bg-indigo-50 rounded-lg text-center">
        <p class="text-lg font-semibold text-gray-800">{{ prediction }}</p>
        <p class="text-gray-600">Confidence: {{ confidence }}</p>
    </div>
    {% endif %}

    {% if error %}
    <div class="mt-4 p-3 bg-red-100 text-red-700 rounded-lg text-center">
        {{ error }}
    </div>
    {% endif %}
</div>

</body>
</html>
